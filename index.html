<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      width: 100%;
      max-width: 460px;
      padding: 32px;
    }

    h1 {
      font-size: 1.8rem;
      color: #4c3d8f;
      margin-bottom: 8px;
    }

    .stats {
      font-size: .85rem;
      color: #999;
      margin-bottom: 24px;
    }

    .stats span { color: #667eea; font-weight: 600; }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
    }

    .input-row input:focus { border-color: #667eea; }

    .input-row button {
      padding: 12px 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1.3rem;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }

    .input-row button:hover { opacity: .9; transform: scale(1.05); }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .filters button {
      flex: 1;
      padding: 8px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      background: none;
      font-size: .85rem;
      cursor: pointer;
      color: #666;
      transition: all .2s;
    }

    .filters button.active {
      border-color: #667eea;
      background: #667eea;
      color: #fff;
    }

    ul { list-style: none; }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      border-radius: 12px;
      transition: background .15s;
      animation: slideIn .25s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item:hover { background: #f9fafb; }

    .item input[type=checkbox] {
      width: 20px; height: 20px;
      accent-color: #667eea;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item span {
      flex: 1;
      font-size: .97rem;
      color: #333;
      word-break: break-word;
    }

    .item span.done {
      text-decoration: line-through;
      color: #bbb;
    }

    .del {
      background: none;
      border: none;
      color: #ddd;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      transition: color .2s, background .2s;
    }

    .del:hover { color: #ef4444; background: #fee2e2; }

    .empty {
      text-align: center;
      color: #ccc;
      padding: 40px 0;
      font-size: .95rem;
    }

    .clear-btn {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 10px;
      background: none;
      border: 2px dashed #e5e7eb;
      border-radius: 12px;
      color: #aaa;
      font-size: .85rem;
      cursor: pointer;
      transition: all .2s;
    }

    .clear-btn:hover { border-color: #ef4444; color: #ef4444; }
  </style>
</head>
<body>
<div class="card">
  <h1>&#10003; Todo App</h1>
  <p class="stats">Виконано: <span id="done-count">0</span> / <span id="total-count">0</span></p>

  <div class="input-row">
    <input id="new-task" type="text" placeholder="Додати нове завдання..." maxlength="200" />
    <button onclick="addTask()" title="Додати">+</button>
  </div>

  <div class="filters">
    <button class="active" onclick="setFilter('all', this)">Всі</button>
    <button onclick="setFilter('active', this)">Активні</button>
    <button onclick="setFilter('done', this)">Виконані</button>
  </div>

  <ul id="list"></ul>
  <p class="empty" id="empty-msg" style="display:none">Завдань немає &#128512;</p>

  <button class="clear-btn" onclick="clearDone()">Очистити виконані</button>
</div>

<script>
  const STORAGE_KEY = 'todo_items';
  let filter = 'all';

  let tasks = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

  const input   = document.getElementById('new-task');
  const listEl  = document.getElementById('list');
  const emptyEl = document.getElementById('empty-msg');

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }

  function addTask() {
    const text = input.value.trim();
    if (!text) return;
    tasks.unshift({ id: Date.now(), text, done: false });
    input.value = '';
    save();
    render();
  }

  function toggle(id) {
    const t = tasks.find(t => t.id === id);
    if (t) t.done = !t.done;
    save(); render();
  }

  function remove(id) {
    tasks = tasks.filter(t => t.id !== id);
    save(); render();
  }

  function clearDone() {
    tasks = tasks.filter(t => !t.done);
    save(); render();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function render() {
    const visible = tasks.filter(t =>
      filter === 'all'    ? true :
      filter === 'active' ? !t.done : t.done
    );

    document.getElementById('done-count').textContent  = tasks.filter(t => t.done).length;
    document.getElementById('total-count').textContent = tasks.length;

    emptyEl.style.display = visible.length ? 'none' : 'block';
    listEl.innerHTML = visible.map(t => `
      <li class="item">
        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})" />
        <span class="${t.done ? 'done' : ''}">${escape(t.text)}</span>
        <button class="del" onclick="remove(${t.id})" title="Видалити">&times;</button>
      </li>`).join('');
  }

  function escape(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  input.addEventListener('keydown', e => e.key === 'Enter' && addTask());

  render();
</script>
</body>
</html>
